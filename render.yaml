services:
  - type: web
    name: payguard
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: PAYGUARD_DATA_DIR
        value: /var/data/payguard
    disk:
      name: payguard-data
      mountPath: /var/data
      sizeGB: 1
